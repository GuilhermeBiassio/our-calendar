name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar firebase-config.js a partir dos Secrets
        run: |
          cat > firebase-config.js << 'EOF'
          const firebaseConfig = {
              apiKey: "${{ secrets.FIREBASE_API_KEY }}",
              authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
              storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              appId: "${{ secrets.FIREBASE_APP_ID }}",
              measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };

          const _isConfigured = !Object.values(firebaseConfig).some(v =>
            typeof v === 'string' && (v.startsWith('SUA_') || v.startsWith('SEU_'))
          );

          try {
            if (_isConfigured) {
              firebase.initializeApp(firebaseConfig);
              window.db = firebase.firestore();
              window.firebaseEnabled = true;
            } else {
              throw new Error('Firebase não configurado');
            }
          } catch (e) {
            window.firebaseEnabled = false;
            console.warn('Firebase não configurado — usando localStorage como fallback.');
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
